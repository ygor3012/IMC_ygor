<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela IMC</title>
</head>
<body>
    <header>
        <div class="container">
            <h1 class="titulo">Moraes Nutrição</h1>
        </div>
    </header>
    <main>
        <section class="container">
            <h2 class="titulo_secundario">Meus clientes</h2>
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Peso (kg)</th>
                        <th>Altura (m)</th>
                        <th>Gordura corporal (%)</th>
                        <th>IMC</th>
                    </tr>
                </thead>
            </table>
        </section>
    </main>
</body>
</html>
